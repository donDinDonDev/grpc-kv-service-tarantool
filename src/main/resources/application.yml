server:
  port: ${KV_HTTP_PORT:8080}

spring:
  application:
    name: grpc-kv-service-tarantool
  profiles:
    default: local
  grpc:
    server:
      port: ${KV_GRPC_PORT:9090}
      shutdown-grace-period: 30s
      health:
        actuator:
          enabled: true

management:
  endpoint:
    health:
      probes:
        enabled: true
        add-additional-paths: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,tarantool
  endpoints:
    web:
      exposure:
        include: health,metrics
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  otlp:
    metrics:
      export:
        enabled: false

logging:
  structured:
    format:
      console: logstash
    json:
      context:
        include: true

kvservice:
  grpc:
    max-request-bytes: 4MB
    max-response-bytes: 4MB
  limits:
    max-key-bytes: 256B
    max-value-bytes: 1MB
  deadlines:
    unary: 3s
    count: 15s
  range:
    batch-size: 256
    max-active-streams: 16
  tarantool:
    enabled: ${KV_TARANTOOL_ENABLED:true}
    connect-timeout: ${KV_TARANTOOL_CONNECT_TIMEOUT:3s}
    reconnect-after: ${KV_TARANTOOL_RECONNECT_AFTER:1s}
    request-timeout: ${KV_TARANTOOL_REQUEST_TIMEOUT:5s}
    init:
      enabled: ${KV_TARANTOOL_INIT_ENABLED:true}
      engine: ${KV_TARANTOOL_ENGINE:vinyl}
      script-location: classpath:tarantool/kv-init.lua
