spring:
  application:
    name: grpc-kv-service-tarantool
  grpc:
    server:
      port: 9090

kvservice:
  limits:
    max-key-bytes: 256B
    max-value-bytes: 1MB
  deadlines:
    unary: 3s
    count: 15s
  range:
    batch-size: 512
    max-active-streams: 16
  tarantool:
    enabled: true
    host: ${KV_TARANTOOL_HOST:127.0.0.1}
    port: ${KV_TARANTOOL_PORT:3301}
    username: ${KV_TARANTOOL_USERNAME:kvservice}
    password: ${KV_TARANTOOL_PASSWORD:kvservice}
    connect-timeout: 3s
    reconnect-after: 1s
    request-timeout: 5s
    init:
      enabled: true
      engine: ${KV_TARANTOOL_ENGINE:vinyl}
      script-location: classpath:tarantool/kv-init.lua
